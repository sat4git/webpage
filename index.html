<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Trade Matrix Pro</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f19">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f7f9; --surface: #ffffff; --primary: #2563eb;
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --green: #059669; --green-bg: #d1fae5; --red: #dc2626; --red-bg: #fee2e2;
            --radius: 16px; --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body.dark-theme {
            --bg-color: #0b0f19; --surface: #151e2e; --primary: #3b82f6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: #1e293b;
            --green: #10b981; --green-bg: rgba(16, 185, 129, 0.15);
            --red: #ef4444; --red-bg: rgba(239, 68, 68, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; -webkit-font-smoothing: antialiased; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 1.75rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
            background: var(--surface); padding: 24px; border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow-md); margin-bottom: 25px;
        }

        #radioGroup { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .radio-option {
            min-width: 145px; background: var(--bg-color); border: 2px solid transparent;
            padding: 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; flex-shrink: 0;
            touch-action: manipulation;
        }
        .radio-option.active { border-color: var(--primary); background: var(--surface); box-shadow: var(--shadow-md); }
        .strat-profit { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; pointer-events: none; }
        .strat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 4px; color: var(--text-muted); pointer-events: none; }

        #chartSection {
            display: none; position: relative; margin-bottom: 25px; 
            background: var(--surface); border-radius: var(--radius); overflow: hidden; 
            height: 500px; border: 1px solid var(--border);
        }
        #closeChart {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: var(--red); color: white; border: none; padding: 6px 14px;
            border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 700;
        }

        #tableContainer { background: var(--surface); border-radius: var(--radius); overflow-x: auto; border: 1px solid var(--border); box-shadow: var(--shadow-md); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--bg-color); padding: 14px 18px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: right; border-bottom: 1px solid var(--border); }
        th:first-child, td:first-child { text-align: left; }
        td { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 14px; text-align: right; }
        
        .row-glow { animation: rowPulse 1s infinite; border-left: 4px solid var(--green); }
        @keyframes rowPulse { 50% { background-color: var(--green-bg); } }

        .pair-link { color: var(--primary); cursor: pointer; font-weight: 800; text-decoration: underline; }
        .side-badge { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 800; }
        .side-badge.long { background: var(--green-bg); color: var(--green); }
        .side-badge.short { background: var(--red-bg); color: var(--red); }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .val-green { color: var(--green); }
        .val-red { color: var(--red); }
        .text-fade { color: var(--text-muted); font-size: 11px; display: block; opacity: 0.7; }
        .stacked-data { display: flex; flex-direction: column; align-items: flex-end; }

        .icon-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 12px; }
        #alertToggle.active { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }

        #status-container { display: flex; float: right; align-items: center; gap: 10px; margin-top: 15px; cursor: pointer; background: var(--surface); padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border); }
        .sync-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; }
        #countdown-wrap { font-size: 11px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--primary); background: var(--bg-color); padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body class="dark-theme">

<header>
    <h1>Trade Matrix Pro</h1>
    <div class="header-btns">
        <button id="themeToggle" class="icon-btn" onclick="toggleTheme()">🌙 Dark</button>
        <button id="alertToggle" class="icon-btn" onclick="handleAlertToggle()">🔕 ALERTS OFF</button>
    </div>
</header>

<div id="controls">
    <div style="display:flex; flex-direction:column; gap:8px;">
        <span style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Refresh Rate</span>
        <select id="refreshSelect" class="icon-btn" style="width:100%">
            <option value="0">Manual Only</option>
            <option value="30">30 Seconds</option>
            <option value="60">1 Minute</option>
            <option value="300">5 Minutes</option>
            <option value="600">10 Minutes</option>
        </select>
    </div>
    <div style="grid-column: span 2;">
        <span style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; display:block;">Strategies</span>
        <div id="radioGroup"></div>
    </div>
</div>

<div id="chartSection">
    <button id="closeChart" onclick="document.getElementById('chartSection').style.display='none'">✖ Close</button>
    <div id="tradingview_widget" style="height: 100%; width: 100%;"></div>
</div>

<div id="tableContainer"><div id="tableWrap"></div></div>

<div id="status-container" onclick="fetchTrades()">
    <div id="countdown-wrap" style="display:none">NEXT SYNC: <span id="timer">0</span>s</div>
    <div class="sync-dot"></div>
    <div id="status">TAP TO SYNC</div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
const JSON_URL = "https://justforfunssn-default-rtdb.europe-west1.firebasedatabase.app/webAppref.json";
let allData = {}, currentListKey = "", alertsEnabled = false, notifiedTrades = new Set();
let audioCtx = null, refreshInterval = null, secondsRemaining = 0, currentTheme = 'dark';

function toggleTheme() {
    document.body.classList.toggle('dark-theme');
    currentTheme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
    document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '🌙 Dark' : '☀️ Light';
}

function initAudio() { 
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
}

function playCriticalAlert() {
    if(!audioCtx || audioCtx.state !== 'running') return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(850, now);
    osc.frequency.exponentialRampToValueAtTime(1250, now + 0.12);
    gain.gain.setValueAtTime(0.8, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(now + 0.5);
}

function openChart(pair) {
    let clean = pair.replace(/[\/:\s\.]/g, '').replace('USDTUSDT', 'USDT');
    document.getElementById('chartSection').style.display = 'block';
    new TradingView.widget({
        "autosize": true, 
        "symbol": "BINANCE:" + clean + ".P", 
        "interval": "15",
        "theme": currentTheme, 
        "style": "1", 
        "container_id": "tradingview_widget"
    });
    window.scrollTo({top: document.getElementById('chartSection').offsetTop - 20, behavior: 'smooth'});
}

async function fetchTrades() {
    try {
        const res = await fetch(JSON_URL);
        const newData = await res.json();
        if (newData) {
            allData = newData;
            const keys = Object.keys(allData);
            if(!currentListKey && keys.length > 0) currentListKey = keys[0];
            updateUI();
            document.getElementById("status").textContent = "LIVE: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            resetCountdown();
        }
    } catch (e) { console.error("Refresh Error:", e); }
}

function updateUI() {
    const container = document.getElementById("radioGroup"), keys = Object.keys(allData);
    container.innerHTML = keys.map(key => {
        const trades = allData[key] || [];
        const profit = trades.reduce((a, t) => a + (t.profit_pct || 0), 0);
        return `<div class="radio-option ${currentListKey === key ? 'active' : ''}" onclick="switchStrat(event, '${key}')">
            <div class="strat-profit ${profit >= 0 ? 'val-green' : 'val-red'}">${profit.toFixed(2)}%</div>
            <div class="strat-label">${key}</div>
        </div>`;
    }).join('');
    renderData();
}

function switchStrat(event, key) {
    if(event) event.stopPropagation();
    currentListKey = key;
    notifiedTrades.clear();
    updateUI();
}

function renderData() {
    const trades = allData[currentListKey] || [];
    if(alertsEnabled) checkAlerts(trades);
    
    let html = `<table><tr><th style="text-align:left">Pair</th><th>Side</th><th>Entry</th><th>Current</th><th>Profit</th><th>Max Gain</th><th>Drawdown</th></tr>`;
    trades.forEach(t => {
        const isWin = t.profit_pct >= 1.0;
        const mP = (t.max && (t.max.price || t.max.rate || 0)) || 0;
        const miP = (t.min && (t.min.price || t.min.rate || 0)) || 0;

        html += `<tr class="${isWin ? 'row-glow' : ''}">
            <td style="text-align:left"><span class="pair-link" onclick="openChart('${t.pair}')">📈 ${t.pair}</span></td>
            <td><span class="side-badge ${t.is_short ? 'short' : 'long'}">${t.is_short ? 'S' : 'L'}</span></td>
            <td class="font-mono" style="opacity:0.6">${t.open.toFixed(5)}</td>
            <td class="font-mono">${t.current.toFixed(5)}</td>
            <td class="font-mono ${t.profit_pct >= 0 ? 'val-green' : 'val-red'}" style="font-weight:800; font-size:15px;">${t.profit_pct.toFixed(2)}%</td>
            <td>
                <div class="stacked-data">
                    <span class="val-green" style="font-weight:700">${t.max.delta_pct.toFixed(2)}%</span>
                    <span class="text-fade">${mP.toFixed(4)}</span>
                </div>
            </td>
            <td>
                <div class="stacked-data">
                    <span class="val-red" style="font-weight:700">${t.min.delta_pct.toFixed(2)}%</span>
                    <span class="text-fade">${miP.toFixed(4)}</span>
                </div>
            </td>
        </tr>`;
    });
    document.getElementById("tableWrap").innerHTML = html + `</table>`;
}

function checkAlerts(trades) {
    trades.forEach(t => {
        const id = `${currentListKey}-${t.pair}`;
        if(t.profit_pct >= 1.0) {
            if(!notifiedTrades.has(id)) {
                playCriticalAlert();
                notifiedTrades.add(id);
            }
        } else if (t.profit_pct < 0.9) {
            notifiedTrades.delete(id);
        }
    });
}

function handleAlertToggle() {
    const btn = document.getElementById('alertToggle');
    initAudio();
    if(!alertsEnabled) {
        alertsEnabled = true;
        btn.className = "icon-btn active"; btn.textContent = "🔔 ALERTS ON";
        playCriticalAlert();
    } else {
        alertsEnabled = false; 
        btn.className = "icon-btn"; btn.textContent = "🔕 ALERTS OFF";
    }
}

function resetCountdown() {
    const s = parseInt(document.getElementById("refreshSelect").value);
    if(s > 0) {
        secondsRemaining = s;
        document.getElementById("countdown-wrap").style.display = "block";
    } else {
        document.getElementById("countdown-wrap").style.display = "none";
    }
}

setInterval(() => {
    if(secondsRemaining > 0) {
        secondsRemaining--;
        document.getElementById("timer").textContent = secondsRemaining;
        if(secondsRemaining === 0) fetchTrades();
    }
}, 1000);

document.getElementById("refreshSelect").onchange = (e) => {
    if(refreshInterval) clearInterval(refreshInterval);
    const s = parseInt(e.target.value);
    if(s > 0) {
        fetchTrades();
        refreshInterval = setInterval(fetchTrades, s * 1000);
    } else {
        document.getElementById("countdown-wrap").style.display = "none";
    }
};

fetchTrades();
</script>
</body>
</html>
